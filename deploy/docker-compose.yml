# Production orchestration for GC Pallet.
# Two services + an init container that bootstraps PB collections on first boot.
#
# Run with:
#   cp deploy/.env.example deploy/.env   # fill in
#   docker compose --env-file deploy/.env -f deploy/docker-compose.yml up -d
#
# Or after the VM init script has run:
#   cd /opt/gcpallet && docker compose up -d

services:
  # ---- PocketBase backend ----
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    image: gcpallet/backend:latest
    container_name: gcpallet-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PB_URL: http://127.0.0.1:8090
    volumes:
      - pb_data:/pb_data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # The frontend, caddy, and bootstrap talk to the backend on its
    # private port — no need to expose 8090 to the host.
    expose:
      - "8090"

  # ---- Init container: create collections on first boot ----
  # Runs once after PB is healthy, then exits. Re-runs are idempotent.
  bootstrap:
    image: curlimages/curl:8.10.1
    container_name: gcpallet-bootstrap
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PB_URL: http://backend:8090
    entrypoint: ["/bin/sh", "-c"]
    # Pull the bootstrap script out of the backend image and run it.
    # The `docker cp` would need a sidecar; using `docker run --rm -v` would
    # need a separate build. Simplest: shell-fetch from inside the backend
    # container via docker exec, but that requires the backend image to have
    # bash + curl. It does. So:
    command:
      - |
        set -e
        # Wait for backend to accept admin auth.
        echo "[bootstrap] waiting for backend to accept admin auth …"
        ATTEMPTS=0
        until [ $$ATTEMPTS -ge 30 ]; do
          if docker exec gcpallet-backend test -f /usr/local/bin/wait-and-bootstrap.sh; then
            break
          fi
          ATTEMPTS=$$((ATTEMPTS+1))
          sleep 2
        done
        docker exec \
          -e ADMIN_EMAIL=$$ADMIN_EMAIL \
          -e ADMIN_PASSWORD=$$ADMIN_PASSWORD \
          -e PB_URL=http://127.0.0.1:8090 \
          gcpallet-backend /usr/local/bin/wait-and-bootstrap.sh
    restart: "no"

  # ---- Next.js frontend ----
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    image: gcpallet/frontend:latest
    container_name: gcpallet-frontend
    restart: unless-stopped
    env_file:
      - .env
    # POCKETBASE_URL is read by the server-side /api/shares/[token] route
    # to call PB over the docker network. NEXT_PUBLIC_PB_URL is baked into
    # the client at build time and points at the public reverse-proxy path.
    environment:
      POCKETBASE_URL: http://backend:8090
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"

  # ---- Caddy reverse proxy + TLS ----
  # Listens on 80/443, terminates TLS, serves the frontend, proxies
  # /api/pb/* to the backend, and proxies /share/* to the frontend
  # (so the public share view works on the public domain).
  caddy:
    image: caddy:2.8-alpine
    container_name: gcpallet-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  pb_data:
    # Persistent PB data (SQLite + uploaded files). Backup with backup.sh.
  caddy_data:
  caddy_config:
